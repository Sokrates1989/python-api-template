# App-specific Docker Compose overrides for felix.
#
# POSTGRES_DATA_ROOT and PGADMIN_DATA_ROOT are injected by quick-start.sh.
# On Windows/WSL2 they resolve to a WSL2-native path so that PostgreSQL and
# pgAdmin can chown their data directories (NTFS DrvFs mounts do not allow
# Linux ownership changes). On macOS/Linux they resolve to the standard
# project-relative .docker/apps/felix/ path.

services:
  api:
    environment:
      APP_PROFILE: felix
      # Allow the Flutter web dev server to make cross-origin requests.
      # Port 3000 is the default Flutter web port used by quick-start.ps1.
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,http://localhost:8080,http://localhost:4200"
      # Felix AI chat is backend-only. Configure these values on the API
      # service to enable live provider answers; leave them empty to use the
      # deterministic fallback without exposing any AI key to Flutter.
      # AI_CHAT_COMPLETIONS_ENDPOINT: "https://provider.example/v1/chat/completions"
      # AI_CHAT_API_KEY_FILE: "/run/secrets/felix_ai_chat_api_key"
      # AI_CHAT_MODEL: "provider-model-name"
      # Web Push exposes only the public key. Delivery reads the private PEM
      # by path and never returns or logs its contents. Mount both files through
      # the deployment secret owner rather than committing key material.
      # WEB_PUSH_VAPID_PUBLIC_KEY_FILE: "/run/secrets/felix_web_push_public_key"
      # WEB_PUSH_VAPID_PRIVATE_KEY_FILE: "/run/secrets/felix_web_push_private_key"
      # WEB_PUSH_VAPID_SUBJECT: "mailto:operations@example.com"
      # WEB_PUSH_DEFAULT_TTL_SECONDS: "86400"
      # WEB_PUSH_REQUEST_TIMEOUT_SECONDS: "10"
      # Dispatch is opt-in so a deployment cannot claim scheduled delivery
      # until both VAPID secrets and provider migrations are accepted.
      # WEB_PUSH_DISPATCH_ENABLED: "true"
      # WEB_PUSH_DISPATCH_POLL_SECONDS: "15"
      # WEB_PUSH_DISPATCH_BATCH_SIZE: "25"
      # WEB_PUSH_DISPATCH_LEASE_SECONDS: "120"
      # WEB_PUSH_DISPATCH_MAX_ATTEMPTS: "6"
      # WEB_PUSH_DISPATCH_RETRY_BASE_SECONDS: "30"
      # WEB_PUSH_DISPATCH_RETRY_MAX_SECONDS: "3600"
      # Local-only AI diagnostics. Production compose templates should leave
      # this disabled unless an operator explicitly opts in.
      AI_CHAT_DEBUG_ENABLED: "true"
      AI_CHAT_DEBUG_INCLUDE_PROMPTS: "true"
      AI_CHAT_LOG_DIR: "/app/ai_chat_logs"
    volumes:
      - ../../logs/ai_chat:/app/ai_chat_logs

  postgres:
    volumes:
      - ${POSTGRES_DATA_ROOT}:/var/lib/postgresql/data

  pgadmin:
    volumes:
      - ${PGADMIN_DATA_ROOT}:/var/lib/pgadmin
