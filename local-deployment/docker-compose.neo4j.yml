# IMPORTANT:
# Set a unique Compose project name per repo. Otherwise Docker Compose can derive the project name
# from the folder name (e.g. "local-deployment"), leading to cross-repo collisions (containers,
# networks, volumes like "<project>-app-1").
name: python-api-template

services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION}
    ports:
      - "${PORT}:8000"
    env_file:
      - ${APP_ENV_FILE:-../.env}
    environment:
      DB_TYPE: ${DB_TYPE}
      NEO4J_URL: ${NEO4J_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      DEBUG: ${DEBUG}
    volumes:
      # Mount individual directories for live-reloading of code.
      - ../app/main.py:/app/main.py
      - ../app/api:/app/api
      - ../app/backend:/app/backend
      - ../app/models:/app/models
      - ../app/mounted_data:/mnt/data
      # Mount backups directory to host for persistence and easy access
      - ../backups:/app/backups
      # Note: .venv is built into the image, not mounted as a volume
      # This ensures dependencies always match pdm.lock from the build
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_started

  neo4j:
    image: neo4j:5.26
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${DB_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${DB_USER:-neo4j}/${DB_PASSWORD:-password}
    volumes:
      - ${NEO4J_DATA_DIR:-../.docker/neo4j-data}:/data
      - ${NEO4J_LOGS_DIR:-../.docker/neo4j-logs}:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
