# Basic Docker Compose - App + Redis only
# Use this for:
#   - External databases (DB_MODE=external)
#   - Custom database setups
# For local Docker databases, use:
#   - docker-compose.postgres.yml (PostgreSQL + Redis + App)
#   - docker-compose.neo4j.yml (Neo4j + Redis + App)
#   - docker-compose.mongodb.yml (MongoDB + Redis + App)
# See docs/DOCKER_SETUP.md for detailed instructions

# IMPORTANT:
# Set a unique Compose project name per repo. Otherwise Docker Compose can derive the project name
# from the folder name (e.g. "local-deployment"), leading to cross-repo collisions (containers,
# networks, volumes like "<project>-app-1").
name: python-api-template

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION}
        BACKEND_APP_ID: ${ACTIVE_BACKEND_APP_ID:-demo_app}
        BACKEND_DATA_PROFILE: ${DB_TYPE}
    ports:
      - "${PORT}:8000"
    env_file:
      - ${APP_ENV_FILE:-../.env}
    environment:
      # Pin internal container port so env_file cannot override it.
      PORT: "8000"
      DB_TYPE: ${DB_TYPE}
      NEO4J_URL: ${NEO4J_URL}
      DATABASE_URL: ${DATABASE_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      DEBUG: ${DEBUG}
    volumes:
      # Mount individual directories for live-reloading of code.
      # This ensures the pyproject.toml and pdm.lock from the build are not overwritten.
      - ../app/main.py:/app/main.py
      - ../app/api:/app/api
      - ../app/backend:/app/backend
      - ../app/models:/app/models
      - ../app/apps:/app/apps
      - ../alembic:/app/alembic
      - ../app/mounted_data:/mnt/data
      # Mount backups directory to host for persistence and easy access
      - ../backups:/app/backups
      # Note: .venv is built into the image, not mounted as a volume
      # This ensures dependencies always match pdm.lock from the build
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
