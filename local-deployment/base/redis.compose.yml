# Shared Docker Compose fragment for the Redis sidecar.

services:
  api:
    environment:
      REDIS_URL: ${REDIS_URL}
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
