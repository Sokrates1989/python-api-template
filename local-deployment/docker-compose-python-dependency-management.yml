# docker-compose.yml for Python Dependency Management
#
# DEPRECATED: This compose file is superseded by tools/core-pdm-manager/docker/docker-compose.pdm-manager.yml.
# It is kept for backward compatibility during the migration period.
# New features and fixes are applied in the core-pdm-manager submodule only.
# See: tools/core-pdm-manager/docs/HOST_INTEGRATION_GUIDE.md
#
# This file defines a service for an interactive Python project management environment.
# It mounts the project root to /workspace and allows running Poetry/PDM commands inside Docker.
# Usage: docker-compose run --rm dev bash

# IMPORTANT:
# Set a unique Compose project name per repo. Otherwise Docker Compose can derive the project name
# from the folder name (e.g. "local-deployment"), leading to cross-repo collisions (containers,
# networks, volumes like "<project>-app-1").
name: python-api-template

services:
  dev:
    build:
      context: ../tools/core-pdm-manager
      dockerfile: docker/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13-slim}
        USER_ID: ${PDM_MANAGER_UID:-1000}
        GROUP_ID: ${PDM_MANAGER_GID:-1000}
    image: core-pdm-manager:latest
    volumes:
      - ..:/workspace
    working_dir: /workspace

    tty: true
    stdin_open: true
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      - ../.env
    environment:
      - USE_UV_BACKEND=${USE_UV_BACKEND:-true}
      - PDM_INSTALL_CACHE=${PDM_INSTALL_CACHE:-true}
      - PDM_PARALLEL_INSTALL=${PDM_PARALLEL_INSTALL:-true}
      - PIPX_HOME=/home/devuser/.local/pipx
      - PIPX_BIN_DIR=/home/devuser/.local/bin
      - PATH=/home/devuser/.local/bin:$PATH