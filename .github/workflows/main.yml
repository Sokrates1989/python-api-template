name: Quality Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Syntax and import compilation check
        run: python -m compileall app/api app/backend app/models app/apps template_v2 tests qa_pytest tools/validate_template_v2_backend_foundation.py tools/validate_template_v2_networked_recipes.py tools/template_v2_backend_lifecycle.py

      - name: Validate Template V2 backend foundation contract
        run: |
          python tools/validate_template_v2_backend_foundation.py --json
          python tools/validate_template_v2_networked_recipes.py --json
          python -m unittest tests.test_template_v2_backend_foundation_contract tests.test_template_v2_backend_lifecycle tests.test_template_v2_records_starter_unittest tests.test_template_v2_networked_recipes_contract

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install mypy
        run: python -m pip install --upgrade pip mypy

      - name: Run focused type checks
        working-directory: app
        run: mypy --ignore-missing-imports -p backend.ports -p backend.services.user_service -p backend.services.example_service -p backend.services.backup_service -p apps.secure_messaging

  shared-tests:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run shared unit tests
        run: python -m pytest -c pytest.ini qa_pytest/unit -q

      - name: Run shared contract tests
        run: python -m pytest -c pytest.ini qa_pytest/contracts -m contract -q

  security-and-standards:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bandit
        run: python -m pip install --upgrade pip bandit

      - name: Run source security scan
        run: bandit -r app/api app/backend app/models app/apps -f txt -ll

  app-discovery:
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    outputs:
      apps: ${{ steps.discover.outputs.apps }}
      runtime-apps: ${{ steps.discover.outputs.runtime_apps }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Discover app slices
        id: discover
        working-directory: app
        run: |
          python3 -c '
          import json, pkgutil
          import apps
          from pathlib import Path

          app_dir = Path("apps").resolve()
          results = []
          runtime_results = []
          for info in pkgutil.iter_modules(apps.__path__):
              if not info.ispkg or info.name.startswith("_"):
                  continue
              app_path = app_dir / info.name
              has_definition = (app_path / "definition.py").exists()
              has_pyproject = (app_path / "pyproject.toml").exists()
              has_lock = (app_path / "pdm.lock").exists()
              has_deployment = (app_path / "deployment" / "compose.override.yml").exists()
              if not has_definition:
                  continue
              app_info = {
                  "name": info.name,
                  "has_pyproject": has_pyproject,
                  "has_lock": has_lock,
                  "has_deployment": has_deployment,
              }
              results.append(app_info)
              if has_pyproject and has_lock:
                  runtime_results.append(app_info)
          print(f"apps={json.dumps(results)}")
          print(f"runtime_apps={json.dumps(runtime_results)}")
          ' > /tmp/discovery.txt
          cat /tmp/discovery.txt
          grep '^apps=' /tmp/discovery.txt >> "$GITHUB_OUTPUT"
          grep '^runtime_apps=' /tmp/discovery.txt >> "$GITHUB_OUTPUT"

  app-sanity-checks:
    runs-on: ubuntu-latest
    needs: [app-discovery]
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.app-discovery.outputs.apps) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: App definition import check
        working-directory: app
        run: python3 -c "from apps.registry import get_backend_app_definition; get_backend_app_definition('${{ matrix.app.name }}')"

      - name: App dependency isolation check
        if: matrix.app.has_pyproject && matrix.app.has_lock
        run: |
          python -m pip install --upgrade pip pdm
          pdm venv create --with venv 2>/dev/null || true
          pdm use -f .venv 2>/dev/null || true
          pdm sync -p "app/apps/${{ matrix.app.name }}" --prod --no-self
          pdm run -p "app/apps/${{ matrix.app.name }}" python -c "import apps.${{ matrix.app.name }}.definition; print('ok')"

  reference-provider-integration:
    runs-on: ubuntu-latest
    needs: [app-sanity-checks]
    strategy:
      fail-fast: false
      matrix:
        db_profile:
          - db_type: postgresql
            compose_file: local-deployment/docker-compose.postgres.yml
            backend_app: postgres_template
          - db_type: mongodb
            compose_file: local-deployment/docker-compose.mongodb.yml
            backend_app: mongodb_template
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare environment for profile
        run: |
          cp setup/.env.template .env
          sed -i 's/^DB_MODE=.*/DB_MODE=local/' .env
          sed -i 's/^ACTIVE_BACKEND_APP_ID=.*/ACTIVE_BACKEND_APP_ID=${{ matrix.db_profile.backend_app }}/' .env
          if ! grep -q '^ACTIVE_BACKEND_APP_ID=' .env; then
            echo 'ACTIVE_BACKEND_APP_ID=${{ matrix.db_profile.backend_app }}' >> .env
          fi
          sed -i 's/^APP_PROFILE=.*/APP_PROFILE=${{ matrix.db_profile.backend_app }}/' .env
          if ! grep -q '^APP_PROFILE=' .env; then
            echo 'APP_PROFILE=${{ matrix.db_profile.backend_app }}' >> .env
          fi

          case "${{ matrix.db_profile.db_type }}" in
            postgresql)
              sed -i 's/^DB_TYPE=.*/DB_TYPE=postgresql/' .env
              sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql://postgres:postgres@postgres:5433/apidb|' .env
              sed -i 's/^DB_HOST=.*/DB_HOST=postgres/' .env
              sed -i 's/^DB_NAME=.*/DB_NAME=apidb/' .env
              sed -i 's/^DB_USER=.*/DB_USER=postgres/' .env
              sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=postgres/' .env
              sed -i 's/^DB_PORT=.*/DB_PORT=5433/' .env
              ;;
            mongodb)
              sed -i 's/^DB_TYPE=.*/DB_TYPE=mongodb/' .env
              sed -i 's|^MONGODB_URL=.*|MONGODB_URL=mongodb://mongo:mongo@mongodb:27017/?authSource=admin|' .env
              sed -i 's/^MONGODB_DB_NAME=.*/MONGODB_DB_NAME=apidb/' .env
              sed -i 's/^MONGODB_ROOT_USER=.*/MONGODB_ROOT_USER=mongo/' .env
              sed -i 's/^MONGODB_ROOT_PASSWORD=.*/MONGODB_ROOT_PASSWORD=mongo/' .env
              ;;
            *)
              echo "Unsupported db profile"
              exit 1
              ;;
          esac

      - name: Build and start profile services
        run: docker compose --env-file .env -f ${{ matrix.db_profile.compose_file }} up -d --build

      - name: Dump container state for diagnostics
        if: always()
        run: |
          echo "=== Container status ==="
          docker compose --env-file .env -f ${{ matrix.db_profile.compose_file }} ps -a
          echo "=== API container logs (last 100) ==="
          docker compose --env-file .env -f ${{ matrix.db_profile.compose_file }} logs --tail 100 api || true
          echo "=== Resolved .env (redacted) ==="
          grep -E '^(DB_TYPE|DB_MODE|APP_PROFILE|ACTIVE_BACKEND_APP_ID|MONGODB_URL|MONGODB_DB_NAME|MONGODB_ROOT_USER|PORT)=' .env || true

      - name: Verify provider contract endpoints
        env:
          EXPECTED_PROFILE: ${{ matrix.db_profile.db_type == 'postgresql' && 'sql' || matrix.db_profile.db_type }}
        run: |
          set -e
          PROFILE=""
          for i in $(seq 1 120); do
            if curl -fsS http://localhost:8000/health > /tmp/health.json; then
              PROFILE="$(python3 -c 'import json; data=json.load(open("/tmp/health.json")); print(data.get("provider_profile",""))')"
              if [ "$PROFILE" = "$EXPECTED_PROFILE" ]; then
                break
              fi
            fi
            sleep 2
          done

          if [ "$PROFILE" != "$EXPECTED_PROFILE" ]; then
            echo "Provider profile mismatch. expected=$EXPECTED_PROFILE observed=$PROFILE"
            cat /tmp/health.json || true
            exit 1
          fi

          ADMIN_KEY="$(grep '^ADMIN_API_KEY=' .env | cut -d '=' -f2-)"
          if [ -z "$ADMIN_KEY" ]; then
            echo "ADMIN_API_KEY missing in .env"
            exit 1
          fi

          curl -fsS \
            -H "X-Admin-Key: $ADMIN_KEY" \
            http://localhost:8000/database/provider-info > /tmp/provider_info.json

          python3 -c 'import json,os,sys; d=json.load(open("/tmp/provider_info.json")); e=os.environ["EXPECTED_PROFILE"]; o=d.get("provider_profile"); sys.exit(f"provider-info mismatch: expected={e} observed={o}") if o!=e else None'

          curl -fsS -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -d '{"operation":"ci_drill"}' \
            http://localhost:8000/database/lock > /tmp/lock.json

          python3 -c 'import json,sys; d=json.load(open("/tmp/lock.json")); sys.exit(f"lock contract failed: {d}") if not d.get("success") or not d.get("is_locked") else None'

          curl -fsS -X POST \
            -H "X-Admin-Key: $ADMIN_KEY" \
            http://localhost:8000/database/unlock > /tmp/unlock.json

          python3 -c 'import json,sys; d=json.load(open("/tmp/unlock.json")); sys.exit(f"unlock contract failed: {d}") if not d.get("success") or d.get("is_locked") else None'

      - name: Run test suite in app container
        run: docker compose --env-file .env -f ${{ matrix.db_profile.compose_file }} run --rm -v "${PWD}/tests:/app/tests" api python -m unittest discover -s tests -p "test_*.py" -t . -v

      - name: Run pytest unit suite in app container
        run: |
          docker compose --env-file .env -f ${{ matrix.db_profile.compose_file }} run --rm -v "${PWD}/qa_pytest:/app/qa_pytest" -v "${PWD}/pytest.ini:/app/pytest.ini" api sh -lc "/app/.venv/bin/python -m ensurepip && /app/.venv/bin/python -m pip install pytest && /app/.venv/bin/python -m pytest -c /app/pytest.ini /app/qa_pytest/unit -q"

      - name: Run pytest shared contract suite in app container
        run: |
          docker compose --env-file .env -f ${{ matrix.db_profile.compose_file }} run --rm -v "${PWD}/qa_pytest:/app/qa_pytest" -v "${PWD}/pytest.ini:/app/pytest.ini" api sh -lc "/app/.venv/bin/python -m ensurepip && /app/.venv/bin/python -m pip install pytest && /app/.venv/bin/python -m pytest -c /app/pytest.ini /app/qa_pytest/contracts -m contract -q"

      - name: Collect app logs on failure
        if: failure()
        run: docker compose --env-file .env -f ${{ matrix.db_profile.compose_file }} logs --tail 200 api

      - name: Shutdown profile services
        if: always()
        run: docker compose --env-file .env -f ${{ matrix.db_profile.compose_file }} down -v --remove-orphans

  build-and-push:
    runs-on: ubuntu-latest
    needs: [reference-provider-integration]
    if: false
    steps:
      - name: Skipped build-and-push
        run: |
          echo "Image build and push are intentionally disabled in GitHub Actions."
          echo "Manual releases are handled outside this repository's CI pipeline."
